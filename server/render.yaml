services:
  - type: web
    name: social-network-backend
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: CLIENT_ORIGINS
        value: https://social-network-fronted.onrender.com,http://localhost:5173,http://127.0.0.1:5173
      - key: CLIENT_URL
        value: https://social-network-fronted.onrender.com
      - key: NODE_ENV
        value: production
